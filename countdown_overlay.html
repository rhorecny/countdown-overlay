<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Service Countdown Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000000;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
  }

  .overlay {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    background: #000000;
    color: #FFFFFF;
    text-align: center;
  }

  .label {
    font-weight: 700;
    font-size: 3vw;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .clock {
    font-weight: 700;
    font-size: 8vw;
    line-height: 1;
    letter-spacing: 0.05em;
  }

  .seat-message {
    font-weight: 700;
    font-size: 1.8vw;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    max-width: 80vw;
  }

  .finished {
    font-weight: 700;
    font-size: 4vw;
    text-transform: uppercase;
  }

</style>
</head>
<body>

<div class="overlay">
  <div class="label" id="label">Service Begins In</div>
  <div class="clock" id="clock">00:00</div>
  <div class="seat-message" id="seat-message" style="display:none;">
    PLEASE FIND YOUR SEAT IN THE SANCTUARY, SERVICE IS ABOUT TO BEGIN
  </div>
</div>

<script>
  /* =====================================================
     SET YOUR SERVICE TIME HERE
     Target: 9:30 AM, based on the LOCAL TIME of the
     device/browser displaying this page (the Yodeck player).

     If 9:30 AM has already passed for today, the countdown
     automatically rolls over to 9:30 AM tomorrow.

     To change the time, edit the hours/minutes below
     (24-hour clock).
     ===================================================== */

  function getNextTarget() {
    const now = new Date();
    const target = new Date();
    target.setHours(13, 0, 0, 0); // 1:00 PM

    if (target <= now) {
      target.setDate(target.getDate() + 1);
    }
    return target;
  }

  let targetTime = getNextTarget();

  const FIVE_MINUTES = 5 * 60; // seconds

  function updateCountdown() {
    const now = new Date();
    const diff = targetTime - now;
    const labelEl = document.getElementById('label');
    const clockEl = document.getElementById('clock');
    const seatMsgEl = document.getElementById('seat-message');

    if (diff <= 0) {
      labelEl.style.display = 'none';
      clockEl.style.display = 'none';
      seatMsgEl.style.display = 'none';

      let finishedEl = document.getElementById('finished');
      if (!finishedEl) {
        finishedEl = document.createElement('div');
        finishedEl.id = 'finished';
        finishedEl.className = 'finished';
        finishedEl.textContent = 'Service Is In Session';
        document.querySelector('.overlay').appendChild(finishedEl);
      }

      // Recalculate for the next day in case the page stays open
      targetTime = getNextTarget();
      return;
    }

    const totalSeconds = Math.floor(diff / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);

    clockEl.textContent = String(hours).padStart(2, '0') + ':' + String(minutes).padStart(2, '0');

    if (totalSeconds <= FIVE_MINUTES) {
      seatMsgEl.style.display = 'block';
    } else {
      seatMsgEl.style.display = 'none';
    }
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>

</body>
</html>
